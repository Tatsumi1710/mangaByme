<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga By Me</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f9f9f9] text-[#1a1a1a] font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-amber-600 text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-14">
        
        <nav class="flex items-center h-full text-sm font-semibold tracking-wide">
            <a href="#" class="px-4 py-4 hover:bg-amber-700 transition-colors" onclick="resetToAll()">Trang Chủ</a>
            <div class="relative group h-full flex items-center">
                <button class="px-4 py-4 hover:bg-amber-500 bg-amber-500/30 h-full flex items-center gap-1 cursor-pointer">
                    Thể Loại 
                    <svg class="w-3 h-3 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>

                <div class="hidden group-hover:grid absolute top-14 left-0 w-[95vw] max-w-4xl bg-white text-gray-800 p-6 rounded-b-lg shadow-xl border border-gray-100 grid-cols-4 sm:grid-cols-8 gap-x-4 gap-y-3 z-50 text-xs font-normal">
                    
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Action">Action</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Adventure">Adventure</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Comedy">Comedy</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Seinen">Seinen</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Shonen">Shounen</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Dark Fantasy">Dark Fantasy</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Romance">Romance</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Isekai">Isekai</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Drama">Drama</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Fantasy">Fantasy</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Horror">Horror</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Mystery">Mystery</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Sci-fi">Sci-fi</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Slice of life">Slice of life</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Sports">Sports</button>
                    <button class="menu-genre-btn text-left hover:text-amber-600 transition-colors cursor-pointer" data-genre="Supernatural">Supernatural</button>
                    
                </div>
            </div>

            <a href="#" class="px-4 py-4 hover:bg-amber-700 transition-colors hidden sm:block">Xếp Hạng</a>
           
        </nav>

        <div class="relative w-48 sm:w-64">
            <input type="text" id="search-input" placeholder="Tìm truyện..." 
                class="w-full px-4 py-1.5 bg-amber-700/40 border border-transparent rounded-full focus:outline-none focus:bg-white focus:text-gray-950 focus:border-gray-300 text-xs placeholder-amber-200 focus:placeholder-gray-400 transition-all">
        </div>

    </div>
</header>

    <main class="w-[60%] mx-auto px-4 py-8">

    <div id="main-page" class="space-y-6">
        <div class="flex justify-end">
            <input type="text" id="search-input" placeholder="Tìm truyện..." class="w-full sm:w-64 px-4 py-2 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-amber-500 transition-colors bg-white shadow-sm">
        </div>

        <div id="manga-container" class="grid grid-cols-1 gap-4">
            </div>
    </div>


    <div id="detail-page" class="hidden space-y-6 animate-fade-in">
        <button id="back-to-list-btn" class="flex items-center gap-2 text-sm text-gray-500 hover:text-amber-600 font-medium transition-colors cursor-pointer bg-white px-4 py-2 rounded-xl border border-gray-100 shadow-sm">
            ⬅️ Quay lại 
        </button>

        <div id="detail-content" class="bg-white p-6 sm:p-8 rounded-2xl border border-gray-100 shadow-sm">
            </div>
    </div>

</main>

    <footer class="border-t border-gray-200 text-center py-6 text-xs text-gray-700 bg-white mt-10">
       © Manga Review by Tatsumi
    </footer>

    <script src="script.js"></script>

<div id="manga-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl relative animate-fade-in">
        
        <button id="close-modal-btn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl font-bold cursor-pointer bg-gray-100 hover:bg-gray-200 w-8 h-8 rounded-full flex items-center justify-center transition-colors">
            &times;
        </button>

        <div id="modal-content" class="p-6 sm:p-8">
            </div>
    </div>
</div>
</body>
</html>
